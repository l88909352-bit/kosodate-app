{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>地域の子育て支援情報</h2>

    {% if supports %}
        <div class="list-group mt-3">
            {% for support in supports %}
            <div class="list-group-item mb-2">
                <h5>{{ support.title }}</h5>
                <p>{{ support.description }}</p>
                {% if support.link %}
                    <a href="{{ support.link }}" target="_blank" class="btn btn-sm btn-outline-primary">詳細を見る</a>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="mt-3">現在、子育て支援情報はありません。</p>
    {% endif %}

    <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">ホームに戻る</a>
</div>
{% endblock %}
