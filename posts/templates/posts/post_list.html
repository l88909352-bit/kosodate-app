{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>投稿一覧</title>
    <link rel="stylesheet" href="{% static 'posts/style.css' %}">

</head>
<body>
    <h1>投稿一覧</h1>

    {% for post in posts %}
        <h2>
         <a href="{% url 'post_detail' post.pk %}">
             {{ post.title }}
         </a>
        </h2>
        <p>{{ post.content }}</p>
        <hr>
    {% endfor %}
</body>
</html>
