{% extends "base.html" %}

{% block content %}
<h2>DMルーム一覧</h2>

<ul class="list-group">
    {% for user in users %}
        <li class="list-group-item">
            <a href="{{ url_for('dm_chat', other_user_id=user.id) }}">
                {{ user.name }}
            </a>
        </li>
    {% else %}
        <li class="list-group-item">
            まだDMはありません
        </li>
    {% endfor %}
</ul>

{% endblock %}
